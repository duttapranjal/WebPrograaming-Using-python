<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <header class="header">
            <h1>My To-Do List</h1>
            <p class="description">Stay organized and productive. Add, edit, and track your daily tasks.</p>
        </header>

        <!-- Input Section -->
        <div class="input-section">
            <input 
                type="text" 
                id="taskInput" 
                class="task-input" 
                placeholder="Enter a new task..." 
                autocomplete="off"
            >
            <input
                type="datetime-local"
                id="dueInput"
                class="due-input"
                title="Due date and time"
            >
            <button id="addBtn" class="add-btn">Add Task</button>
        </div>

        <!-- Task Counter Section -->
        <div class="task-counter">
            <span class="counter-item">
                <strong>Total:</strong> <span id="totalTasks">0</span>
            </span>
            <span class="counter-item">
                <strong>Completed:</strong> <span id="completedTasks">0</span>
            </span>
            <span class="counter-item">
                <strong>Pending:</strong> <span id="pendingTasks">0</span>
            </span>
        </div>

        <!-- Task List Section -->
        <div class="task-list-container">
            <ul id="taskList" class="task-list">
                <!-- Tasks will be added here dynamically -->
            </ul>
            <div id="emptyMessage" class="empty-message">
                No tasks yet. Add one to get started! 🚀
            </div>
        </div>

        <!-- Clear All Button -->
        <div class="action-buttons">
            <button id="clearAllBtn" class="clear-all-btn">Clear All Tasks</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
